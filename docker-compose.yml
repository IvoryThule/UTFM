version: "3.8"

services:
  app:
    build: .
    container_name: university-food-map
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - DATABASE_URL=file:/app/db/prod.db
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-changeme}
    volumes:
      - ./db_data:/app/db

volumes:
  db_data:
