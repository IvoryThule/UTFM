# University Food Map - Nginx 反向代理配置
# 使用方式: deploy.sh 会自动 ln -sf 到 /etc/nginx/sites-enabled/

server {
    listen 8081;
    server_name _;

    # 静态资源由 Nginx 直接提供，跳过 Node.js，性能更好
    location /_next/static/ {
        alias /var/www/UTFM/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /favicon.ico {
        alias /var/www/UTFM/public/favicon.ico;
        access_log off;
    }

    # 其余所有请求代理到 Next.js 进程（内部端口 3004）
    location / {
        proxy_pass http://127.0.0.1:3004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
